server {
    listen 80;
    root /usr/share/nginx/html; // aici sunt fisierele statice si la bulid se face un dist/ cu statice, fisier pe care l iau in dockerfile si l pun in /usr/share/nginx/html
    index index.html;

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
